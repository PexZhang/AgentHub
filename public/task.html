<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <title>AgentHub · 任务详情</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="shell task-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">AgentHub</p>
          <h1>任务详情</h1>
          <p class="muted" id="task-page-subtitle">
            AI经理 先把你带到任务层，看清状态、工作区和进展；需要时你再进入员工直连。
          </p>
        </div>
        <div class="topbar-actions">
          <a class="nav-pill secondary" href="/">返回 AI经理</a>
          <a class="nav-pill secondary" href="/commander.html">指挥总览</a>
          <a class="nav-pill" id="task-direct-link" href="/direct.html" hidden>进入员工直连</a>
          <div class="status-dot-row">
            <span class="status-dot" id="socket-dot"></span>
            <span id="socket-text">正在连接</span>
          </div>
        </div>
      </header>

      <section class="panel task-summary-panel">
        <div class="panel-title-row">
          <div>
            <h2 id="task-title">正在读取任务</h2>
            <p class="muted" id="task-subtitle">
              这里展示任务目标、负责人、工作区和最近进展。
            </p>
          </div>
          <div id="task-status-badges" class="task-status-badges"></div>
        </div>

        <div class="task-summary-body">
          <section class="task-summary-block">
            <span class="context-eyebrow">任务目标</span>
            <p id="task-goal" class="task-primary-copy">正在读取任务目标...</p>
          </section>

          <section class="task-summary-block">
            <span class="context-eyebrow">最近进展</span>
            <p id="task-progress" class="task-secondary-copy">正在读取任务进展...</p>
          </section>

          <div id="task-context-grid" class="context-grid task-context-grid"></div>
          <div id="task-approval-list" class="task-approval-list"></div>
        </div>
      </section>

      <section class="panel task-conversation-panel">
        <div class="panel-title-row">
          <div>
            <h2 id="task-conversation-title">相关对话</h2>
            <p class="muted" id="task-conversation-subtitle">
              先看任务关联会话的上下文，再决定是否要亲自进入直连。
            </p>
          </div>
        </div>

        <div id="task-message-stage" class="message-stage">
          <div id="task-message-toolbar" class="message-toolbar"></div>
          <div id="task-messages" class="messages"></div>
          <button
            type="button"
            id="task-message-jump-button"
            class="message-jump-button"
            hidden
          >
            回到底部
          </button>
        </div>
      </section>
    </div>

    <div id="auth-modal" class="session-modal" hidden>
      <div id="auth-modal-content" class="session-modal-content"></div>
    </div>

    <script type="module" src="/task.js"></script>
  </body>
</html>
