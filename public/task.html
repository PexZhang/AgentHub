<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <title>AgentHub · 任务详情</title>
    <link rel="icon" href="/assets/agenthub-logo-a-triad.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="page page-task" data-page="task">
    <section id="auth-modal" class="auth-entry" hidden>
      <div id="auth-modal-content" class="auth-entry-content"></div>
    </section>

    <main class="shell reading-shell" id="task-shell">
      <header class="topbar compact-topbar">
        <div class="topbar-actions">
          <a class="nav-pill secondary" href="/">返回 AI经理</a>
        </div>
        <div class="status-dot-row">
          <span class="status-dot" id="socket-dot"></span>
          <span id="socket-text">正在连接</span>
        </div>
      </header>

      <section class="surface-card hero-card task-hero">
        <div class="hero-copy compact">
          <p class="section-kicker">Task</p>
          <h1 id="task-title">正在读取任务</h1>
          <p class="muted" id="task-subtitle">
            这里展示任务目标、负责人、工作区和最近进展。
          </p>
          <p class="muted task-page-subtitle" id="task-page-subtitle"></p>
        </div>
      </section>

      <section class="sheet-stack">
        <article class="soft-sheet">
          <strong>任务目标</strong>
          <p id="task-goal">正在读取任务目标...</p>
        </article>

        <article class="soft-sheet">
          <strong>最近进展</strong>
          <p id="task-progress">正在读取任务进展...</p>
        </article>
      </section>

      <div id="task-status-badges" class="chips task-status-badges"></div>
      <div id="task-context-grid" class="context-grid task-context-grid"></div>
      <section id="task-approval-list" class="jump-card-stack"></section>
    </main>

    <script type="module" src="/task.js"></script>
  </body>
</html>
