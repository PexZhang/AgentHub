<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <title>AgentHub</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="manager-home">
    <div class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">AgentHub</p>
          <h1>AI 经理工作台</h1>
          <p class="muted">
            直接把目标交给我。你不用先选设备、员工或目录，只有要看细节时我再带你下钻。
          </p>
        </div>
        <div class="topbar-actions">
          <a class="topbar-text-link" href="/commander.html">需要全局视图时，再看指挥总览</a>
          <div class="status-dot-row">
            <span class="status-dot" id="socket-dot"></span>
            <span id="socket-text">正在连接</span>
          </div>
        </div>
      </header>

      <section class="panel manager-panel">
        <div class="panel-title-row">
          <div>
            <h2>告诉我你现在想推进什么</h2>
            <p class="muted" id="manager-subtitle">
              直接问我任务、员工状态或进度。只有你要深入看某位员工时，我才给你跳转卡片。
            </p>
          </div>
          <button type="button" class="session-action-button" id="manager-context-toggle-button">
            展开
          </button>
        </div>
        <div id="manager-collapsed-summary" class="section-collapsed-summary" hidden></div>
        <div id="manager-status-strip" class="manager-status-strip"></div>
        <div id="manager-stage" class="message-stage manager-stage">
          <div id="manager-messages" class="messages manager-messages"></div>
        </div>
        <form id="manager-composer" class="composer manager-composer">
          <textarea
            id="manager-input"
            rows="1"
            placeholder="比如：现在我的员工有哪些 / 他们现在在做什么 / 帮我看看 Codex Agent 的进度"
          ></textarea>
          <button type="submit" id="manager-send-button">发送给经理</button>
        </form>
      </section>
    </div>

    <div id="auth-modal" class="session-modal" hidden>
      <div id="auth-modal-content" class="session-modal-content"></div>
    </div>

    <script type="module" src="/manager.js"></script>
  </body>
</html>
