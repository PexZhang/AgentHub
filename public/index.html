<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <title>AgentHub</title>
    <link rel="icon" href="/assets/agenthub-logo-a-triad.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="page manager-home" data-page="manager">
    <section id="auth-modal" class="auth-entry" hidden>
      <div id="auth-modal-content" class="auth-entry-content"></div>
    </section>

    <main class="shell manager-shell" id="manager-shell">
      <section class="chat-card manager-chat-card">
        <div class="chat-overlay-top manager-overlay-top" id="manager-overlay-top">
          <div id="manager-context-collapsed-bar" class="collapsed-hero-bar" hidden>
            <div id="manager-collapsed-summary" class="collapsed-hero-summary"></div>
            <button
              type="button"
              class="quiet-button"
              id="manager-context-expand-button"
            >
              展开
            </button>
          </div>

          <section id="manager-topbar" class="hero-block">
            <header class="topbar hero-topbar">
              <div class="hero-copy">
                <div class="brand-lockup" aria-label="AgentHub">
                  <img class="brand-mark" src="/assets/agenthub-logo-a-triad.svg" alt="" />
                  <span class="brand-wordmark">AgentHub</span>
                </div>
                <h1>AI 经理工作台</h1>
                <p class="muted">
                  直接把目标交给我。你不用先选设备、员工或目录，只有要看细节时我再带你下钻。
                </p>
              </div>
              <div class="topbar-actions">
                <a class="nav-pill secondary" href="/commander.html">指挥总览</a>
                <div class="status-dot-row">
                  <span class="status-dot" id="socket-dot"></span>
                  <span id="socket-text">正在连接</span>
                </div>
              </div>
            </header>

            <section id="manager-context-body" class="surface-card intro-card">
              <div class="panel-title-row">
                <div>
                  <p class="section-kicker">Manager</p>
                  <h2>告诉我你现在想推进什么</h2>
                  <p class="muted" id="manager-subtitle">
                    直接问我任务、员工状态或进度。只有你要深入看某位员工时，我才给你跳转卡片。
                  </p>
                </div>
                <button
                  type="button"
                  class="quiet-button"
                  id="manager-context-collapse-button"
                >
                  收起
                </button>
              </div>
              <div id="manager-status-strip" class="suggestion-pills"></div>
            </section>
          </section>
        </div>

        <div id="manager-stage" class="message-stage manager-stage">
          <div id="manager-messages" class="messages manager-messages"></div>
        </div>

        <form id="manager-composer" class="composer floating-composer manager-composer">
          <textarea
            id="manager-input"
            rows="1"
            placeholder="比如：现在我的员工有哪些 / 他们现在在做什么 / 帮我看看 Codex Agent 的进度"
          ></textarea>
          <button type="button" id="manager-send-button">发送给经理</button>
        </form>
      </section>
    </main>

    <script type="module" src="/manager.js"></script>
  </body>
</html>
